server {
    listen 80;
    server_name trendyol-invest.com www.trendyol-invest.com;
    
    # إعادة توجيه HTTP إلى HTTPS
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name trendyol-invest.com www.trendyol-invest.com;
    
    # مسار الملفات
    root /var/www/trendyol-invest.com;
    index index.html;
    
    # إعدادات SSL (سيتم تحديثها بعد تثبيت Certbot)
    ssl_certificate /etc/letsencrypt/live/trendyol-invest.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/trendyol-invest.com/privkey.pem;
    
    # إعدادات SSL الأمنة
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    
    # إعدادات الأمان
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    
    # ضغط Gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml+rss application/json application/javascript;
    
    # Cache للملفات الثابتة
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
    
    # Service Worker
    location /sw.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }
    
    # الصفحة الرئيسية
    location / {
        try_files $uri $uri/ /index.html;
    }
    
    # منع الوصول للملفات المخفية
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
    
    # Logs
    access_log /var/log/nginx/trendyol-invest.com.access.log;
    error_log /var/log/nginx/trendyol-invest.com.error.log;
}

